# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Enables hot-reload, mounts source, and exposes Postgres for local debugging.
services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      target: build
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
