sonar.projectKey=server-inventory
sonar.projectName=ServerInventory
sonar.projectVersion=1.0
sonar.host.url=http://vps-8be9b1a7.vps.ovh.ca:9000

# Source roots
sonar.sources=backend/app,frontend/src
sonar.tests=frontend/e2e

# Exclusions
sonar.exclusions=\
  frontend/dist/**,\
  frontend/node_modules/**,\
  frontend/e2e/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  frontend/playwright-report/**,\
  frontend/test-results/**

# Python
sonar.python.version=3.11

# Test file inclusions — tells SonarQube these are test files not source
sonar.test.inclusions=frontend/e2e/**/*.spec.ts,frontend/e2e/**/*.ts
sonar.coverage.exclusions=frontend/e2e/**,frontend/dist/**,**/__pycache__/**

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
