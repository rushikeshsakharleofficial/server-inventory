sonar.projectKey=rushikeshsakharleofficial_server-inventory
sonar.organization=rushikeshsakharleofficial
sonar.projectName=ServerInventory
sonar.projectVersion=1.0

# Source roots
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests

# Exclusions
sonar.exclusions=\
  frontend/dist/**,\
  frontend/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc

# Python
sonar.python.version=3.11
sonar.coverage.exclusions=backend/tests/**,frontend/dist/**,**/__pycache__/**

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
